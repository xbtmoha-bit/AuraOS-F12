name: AuraOS Cloud Build Compiler

on:
  workflow_dispatch: # يتيح لك بدء الطبخ يدوياً بضغطة زر

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Prepare Server Environment
      run: |
        sudo apt update
        sudo apt install -y bc bison build-essential curl flex g++-multilib gcc-multilib git gnupg gperf lib32readline-dev lib32z1-dev libelf-dev liblz4-tool libssl-dev libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3

    - name: Install Repo Tool
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: Initialize AOSP/LineageOS Source
      run: |
        mkdir -p ~/auraos_workspace
        cd ~/auraos_workspace
        git config --global user.name "AuraOS-Developer"
        git config --global user.email "developer@auraos.local"
        repo init -u https://github.com/LineageOS/android.git -b lineage-20.0 --git-lfs --depth=1

    - name: Sync Minimal Sources (Saves Data & Time)
      run: |
        cd ~/auraos_workspace
        repo sync -c -j$(nproc) --force-sync --no-clone-bundle --no-tags
