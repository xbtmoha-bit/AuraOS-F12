name: AuraOS Cloud Build Compiler

on:
  workflow_dispatch: # زر التشغيل اليدوي

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Free Up Disk Space (تفريغ مساحة السيرفر)
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo apt clean

    - name: Prepare Server Environment (تجهيز الأدوات)
      run: |
        sudo apt update
        sudo apt install -y bc bison build-essential curl flex g++-multilib gcc-multilib git gnupg gperf lib32readline-dev lib32z1-dev libelf-dev liblz4-tool libssl-dev libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3

    - name: Install Repo Tool
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: Initialize & Sync Sources (تحميل الأندرويد الخام)
      run: |
        mkdir -p ~/auraos_workspace
        cd ~/auraos_workspace
        git config --global user.name "AuraOS-Developer"
        git config --global user.email "developer@auraos.local"
        repo init -u https://github.com/LineageOS/android.git -b lineage-20.0 --git-lfs --depth=1
        
        # دمج ملفات تعريف Samsung F12 الخاصة بك
        mkdir -p .repo/local_manifests
        cp $GITHUB_WORKSPACE/manifest/auraos_f12.xml .repo/local_manifests/
        
        # بدء التحميل السريع
        repo sync -c -j$(nproc) --force-sync --no-clone-bundle --no-tags

    - name: Apply AuraOS Tweaks (حقن ميزات الأداء والسرعة)
      run: |
        cd ~/auraos_workspace
        chmod +x $GITHUB_WORKSPACE/auraos_tweaks.sh
        bash $GITHUB_WORKSPACE/auraos_tweaks.sh

    - name: Build AuraOS ROM (طبخ النظام)
      run: |
        cd ~/auraos_workspace
        source build/envsetup.sh
        lunch lineage_m12nsxx-userdebug
        mka bacon -j$(nproc)

    - name: Upload AuraOS ROM Zip (تصدير الملف النهائي للتحميل)
      uses: actions/upload-artifact@v4
      with:
        name: AuraOS-SM-F127G-Stable
        path: ~/auraos_workspace/out/target/product/m12nsxx/*-unofficial*.zip
